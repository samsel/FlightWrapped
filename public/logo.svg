<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1425"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle globe grid -->
  <g stroke="#1e3a5f" stroke-width="1.8" fill="none">
    <circle cx="256" cy="256" r="155"/>
    <ellipse cx="256" cy="256" rx="90" ry="155"/>
    <ellipse cx="256" cy="256" rx="155" ry="55"/>
    <ellipse cx="256" cy="200" rx="125" ry="35"/>
    <ellipse cx="256" cy="312" rx="125" ry="35"/>
  </g>

  <!-- Flight arc -->
  <path d="M 130 330 C 180 160, 320 100, 395 185" stroke="url(#arc)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Origin dot with glow -->
  <circle cx="130" cy="330" r="10" fill="#3b82f6" opacity="0.3"/>
  <circle cx="130" cy="330" r="5" fill="#60a5fa"/>

  <!-- Destination dot with glow -->
  <circle cx="395" cy="185" r="10" fill="#93c5fd" opacity="0.3"/>
  <circle cx="395" cy="185" r="5" fill="#93c5fd"/>

  <!-- Airplane - clean simple shape, angled along the arc -->
  <g transform="translate(370, 170) rotate(-30)">
    <path d="M 12 0 L -4 -5 L -6 -2 L 2 0 L -6 2 L -4 5 Z" fill="white" transform="scale(3.5)"/>
    <path d="M -3 0 L -7 -3.5 L -5.5 -3.5 L -1 0 L -5.5 3.5 L -7 3.5 Z" fill="white" transform="scale(3.5)" opacity="0.85"/>
  </g>
</svg>
