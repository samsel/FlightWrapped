    email_text: |
      Subject: Your British Airways Booking Confirmation - Ref: XKWT7M

      British Airways

      Dear Mr. Jonathan Whitfield,

      Thank you for choosing British Airways. Your booking has been confirmed.

      Booking Reference: XKWT7M

      OUTBOUND FLIGHT
      Flight: BA 178
      Date: 15 October 2024
      Departure: London Heathrow (LHR) Terminal 5 at 11:15
      Arrival: New York John F. Kennedy (JFK) Terminal 7 at 14:20 (local time)
      Aircraft: Boeing 777-200ER
      Class: World Traveller (Economy)
      Seat: 34K
      Meal: Included

      Passenger: Mr. Jonathan Whitfield
      Ticket Number: 125-4398271645
      Executive Club Number: 90127384

      ---

      IMPORTANT: TERMS AND CONDITIONS OF CARRIAGE

      Please read the following terms and conditions carefully before your journey. By completing your booking, you agree to be bound by these terms.

      1. BAGGAGE ALLOWANCE AND POLICY
      1.1 Checked Baggage: Passengers travelling in World Traveller (Economy) class are entitled to one checked bag weighing no more than 23kg (50lbs) with maximum dimensions of 90cm x 75cm x 43cm (35.5in x 29.5in x 16in). Additional bags may be purchased at ba.com/managemybooking for GBP 65.00 per bag per sector if purchased online at least 24 hours before departure, or GBP 85.00 per bag at the airport check-in desk.
      1.2 Cabin Baggage: One cabin bag (maximum 56cm x 45cm x 25cm, up to 23kg) and one personal item (maximum 40cm x 30cm x 15cm) are permitted in the cabin. Items exceeding these dimensions will be placed in the hold at the gate and an excess baggage charge may apply.
      1.3 Restricted Items: Please refer to the full list of prohibited items at ba.com/restrictedgoods. Lithium batteries must be carried in hand baggage only. Spare lithium batteries must have terminals protected against short circuit.
      1.4 Sports Equipment: Surfboards, bicycles, golf clubs, and other sports equipment are accepted as checked baggage subject to prior arrangement and applicable fees. Please contact British Airways at least 72 hours before departure.

      2. CHECK-IN REQUIREMENTS
      2.1 Online check-in opens 24 hours before departure and closes 1 hour before departure at ba.com/checkin.
      2.2 Airport check-in desks open 3 hours before departure and close 60 minutes before departure for long-haul flights.
      2.3 Passengers must present valid travel documentation including passport, visa (where required), and any health documentation mandated by the destination country.
      2.4 Boarding gates close 20 minutes before departure. Passengers not at the gate by this time will be denied boarding.

      3. CHANGES AND CANCELLATION POLICY
      3.1 Changes to your booking may be made at ba.com/managemybooking or by calling our contact centre. A change fee of GBP 75.00 per person per sector applies for World Traveller tickets, plus any fare difference.
      3.2 Cancellations made more than 24 hours after booking will be subject to a cancellation fee. Refund amounts depend on fare type and are calculated based on applicable fare rules.
      3.3 No-show: If you do not check in or board your outbound flight, all subsequent flights on the booking may be automatically cancelled.
      3.4 Schedule Changes: British Airways reserves the right to alter flight times and routing. In the event of a significant schedule change, passengers will be offered the choice of rebooking or a refund.

      4. LIABILITY AND INSURANCE
      4.1 British Airways' liability for loss, delay or damage to baggage is limited in accordance with the Montreal Convention to 1,288 Special Drawing Rights (approximately GBP 1,300) per passenger.
      4.2 We strongly recommend that all passengers obtain comprehensive travel insurance covering medical expenses, trip cancellation, baggage loss, and personal liability. British Airways is not an insurance provider and accepts no liability for uninsured losses.

      RETURN FLIGHT
      Flight: BA 179
      Date: 22 October 2024
      Departure: New York John F. Kennedy (JFK) Terminal 7 at 19:30
      Arrival: London Heathrow (LHR) Terminal 5 at 07:15+1 (local time)
      Aircraft: Boeing 777-200ER
      Class: World Traveller (Economy)
      Seat: 34K
      Meal: Included

      Have a wonderful trip. We look forward to welcoming you on board.

      British Airways Customer Services
      ba.com
